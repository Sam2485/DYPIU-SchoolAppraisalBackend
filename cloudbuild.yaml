steps:
  # Pull :latest for layer cache (fail-safe — ignore if image doesn't exist yet)
  - name: gcr.io/cloud-builders/docker
    id: pull-cache
    entrypoint: bash
    args:
      - -c
      - docker pull $_IMAGE:latest || true

  # Build the Spring Boot image (Maven runs inside the multi-stage Dockerfile)
  - name: gcr.io/cloud-builders/docker
    id: build
    waitFor: [pull-cache]
    args:
      - build
      - --cache-from=$_IMAGE:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - -t=$_IMAGE:latest
      - -t=$_IMAGE:$COMMIT_SHA
      - .
    env:
      - DOCKER_BUILDKIT=1

  # Push :latest — deploy step needs this image to exist first
  - name: gcr.io/cloud-builders/docker
    id: push-latest
    waitFor: [build]
    args: [push, '$_IMAGE:latest']

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push-latest]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - director-appraisal-backend
      - --image=$_IMAGE:latest
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --add-cloudsql-instances=$_SQL_INSTANCE
      # Environment variables
      - --update-env-vars=DATABASE_URL=jdbc:postgresql:///director_appraisal?cloudSqlInstance=$_SQL_INSTANCE&socketFactory=com.google.cloud.sql.postgres.SocketFactory,DB_USERNAME=postgres,GCP_BUCKET_NAME=$_BUCKET_NAME,GCP_PROJECT_ID=$PROJECT_ID,GCP_ENABLED=true,EMAIL_USERNAME=$_EMAIL_USERNAME,FRONTEND_URL=$_FRONTEND_URL
      # Secrets pulled from Secret Manager
      - --update-secrets=DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,EMAIL_PASSWORD=EMAIL_PASSWORD:latest
      - --quiet

  # Push :COMMIT_SHA in parallel with deploy for traceability
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    waitFor: [push-latest]
    args: [push, '$_IMAGE:$COMMIT_SHA']

substitutions:
  # Customize these default substitutions when triggering builds
  _IMAGE: asia-south1-docker.pkg.dev/director-appraisal/director-appraisal-repo/backend
  _SQL_INSTANCE: director-appraisal-project:asia-south1:director-appraisal-db
  _BUCKET_NAME: director-appraisal-attachments
  _EMAIL_USERNAME: your-email@gmail.com
  _FRONTEND_URL: http://localhost:5173

images:
  - $_IMAGE:latest
  - $_IMAGE:$COMMIT_SHA

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
