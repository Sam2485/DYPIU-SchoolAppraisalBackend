spring:
  application:
    name: director-appraisal
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ── Database ──────────────────────────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/director_appraisal}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ───────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns the schema
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ── Flyway ────────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

# ── JWT & Custom Configs ──────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:SecretKeyForJWTAppraisalMustBeAtLeast256BitsLongForHMACSHA256}
    expiration-ms: 86400000 # 24 hours
  gcp:
    enabled: ${GCP_ENABLED:false}
    bucket-name: ${GCP_BUCKET_NAME:director-appraisal-attachments}
    project-id: ${GCP_PROJECT_ID:director-appraisal-project}
  upload:
    local-path: ${UPLOAD_LOCAL_PATH:./uploads}
