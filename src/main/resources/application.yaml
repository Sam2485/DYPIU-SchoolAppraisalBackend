server:
  port: ${PORT:8080}
  tomcat:
    max-http-form-post-size: -1
    max-swallow-size: -1

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  application:
    name: director-appraisal
  
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1

  # ── Database ──────────────────────────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/director_appraisal}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ───────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns the schema
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ── Flyway ────────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:1}
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

  # ── Mail Configuration ────────────────────────────────────────────────────────
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:${EMAIL_USERNAME:your-email@gmail.com}}
    password: ${SMTP_PASSWORD:${EMAIL_PASSWORD:your-app-password}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # ── Redis Configuration ───────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# ── JWT & Custom Configs ──────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:${JWT_SECRET_KEY:SecretKeyForJWTAppraisalMustBeAtLeast256BitsLongForHMACSHA256}}
    expiration-ms: 86400000 # 24 hours
  upload:
    local-path: ${LOCAL_STORAGE_DIR:${UPLOAD_LOCAL_PATH:./uploads}}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:${spring.mail.username:your-email@gmail.com}}

# ── Rate Limiting Configs ─────────────────────────────────────────────────────
rate-limit:
  login:
    capacity: ${RATE_LIMIT_LOGIN_CAPACITY:5}
    refillTokens: ${RATE_LIMIT_LOGIN_REFILL_TOKENS:5}
    refillDuration: ${RATE_LIMIT_LOGIN_REFILL_DURATION:60s}
  forgot:
    capacity: ${RATE_LIMIT_FORGOT_CAPACITY:5}
    refillTokens: ${RATE_LIMIT_FORGOT_REFILL_TOKENS:5}
    refillDuration: ${RATE_LIMIT_FORGOT_REFILL_DURATION:60s}

logging:
  level:
    root: INFO
    com.director_appraisal.director_appraisal: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
