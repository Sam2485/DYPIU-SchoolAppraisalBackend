server:
  port: ${PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:vm}
  application:
    name: director-appraisal
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  # ── Database ──────────────────────────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/director_appraisal}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ───────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns the schema
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ── Flyway ────────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:1}
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

  # ── Mail Configuration ────────────────────────────────────────────────────────
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:${EMAIL_USERNAME:your-email@gmail.com}}
    password: ${SMTP_PASSWORD:${EMAIL_PASSWORD:your-app-password}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ── JWT & Custom Configs ──────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:${JWT_SECRET_KEY:SecretKeyForJWTAppraisalMustBeAtLeast256BitsLongForHMACSHA256}}
    expiration-ms: 86400000 # 24 hours
  gcp:
    enabled: ${GCP_ENABLED:false}
    bucket-name: ${GCP_BUCKET_NAME:${GCP_STORAGE_BUCKET:director-appraisal-attachments}}
    project-id: ${GCP_PROJECT_ID:director-appraisal-project}
  upload:
    local-path: ${LOCAL_STORAGE_DIR:${UPLOAD_LOCAL_PATH:./uploads}}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:${spring.mail.username:your-email@gmail.com}}
